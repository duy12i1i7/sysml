paper_swarm_coordinator:
  ros__parameters:
    robot_namespaces: ["robot1", "robot2"]
    odom_topic: "odom"
    pose_topic: ""
    target_topic: "/target_pose"
    formation_mode: "leader_follower"
    leader_namespace: "robot1"
    follower_distance_m: 0.55
    follower_lateral_offset_m: 0.0
    target_reached_tolerance_m: 0.18

target_publisher:
  ros__parameters:
    mode: "fixed"
    target_x: 1.722
    target_y: 0.717
    random_bounds: [1.07, 2.67, 0.27, 2.72]

rviz_target_bridge:
  ros__parameters:
    goal_pose_namespaces: [""]
    clicked_point_namespaces: ["", "robot1", "robot2"]
    goal_pose_topic: "goal_pose"
    clicked_point_topic: "clicked_point"
    target_topic: "/target_pose"
    target_frame: "map"

simple_goal_follower:
  ros__parameters:
    robot_namespaces: ["robot1", "robot2"]
    odom_topic: "odom"
    cmd_vel_topic: "cmd_vel"
    cmd_vel_stamped: false
    goal_tolerance_m: 0.12
    map_clearance_m: 0.22
    map_unknown_is_obstacle: true
    map_waypoint_tolerance_m: 0.08
    map_replan_period_sec: 1.0
    min_robot_separation_m: 0.35
    slow_robot_separation_m: 0.55
    separation_linear_velocity: 0.06
    max_linear_velocity: 0.25
    max_angular_velocity: 1.2

odom_offsetter:
  ros__parameters:
    robot_namespaces: ["robot1", "robot2"]
    input_odom_topic: "odom_raw"
    output_odom_topic: "odom"
    frame_id: "map"
    initial_pose_x: [1.322, 2.122]
    initial_pose_y: [1.317, 1.317]
    initial_pose_yaw: [0.0, 0.0]
    max_pose_jump_m: 0.35

metrics_logger:
  ros__parameters:
    robot_namespaces: ["robot1", "robot2"]
    odom_topic: "odom"
    pose_topic: ""
    output_dir: "metrics/stable_sim"
    max_pose_jump_m: 0.35

occupancy_grid_marker:
  ros__parameters:
    map_topic: "/map"
    marker_topic: "/swarm/map_markers"
    goal_min_clearance_m: 0.22
    unknown_blocks_goal: true
